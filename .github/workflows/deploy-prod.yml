name: Deploy Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: autenticacao_api
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: autenticacao_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: bcmath, exif, gd, intl, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare environment
        run: |
          cp .env.testing.example .env.testing
          composer install --no-interaction --prefer-dist
          npm install
          php artisan key:generate --env=testing --force

      - name: Run migrations
        env:
          APP_ENV: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: autenticacao_test
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
        run: php artisan migrate --env=testing --force

      - name: Run tests
        env:
          APP_ENV: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: autenticacao_test
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
        run: php artisan test

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="${GITHUB_REPOSITORY##*/}"
          echo "image=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image }}:prod

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger deploy on droplet
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd '${{ env.DEPLOY_PATH }}' && ./scripts/deploy-service.sh '${{ env.SERVICE_NAME }}' '${{ needs.build.outputs.image_tag }}'"
