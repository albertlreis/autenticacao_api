name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run production migrations during deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-autenticacao-api
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: autenticacao_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: bcmath, exif, gd, intl, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare environment
        run: |
          cp .env.testing.example .env.testing
          composer install --no-interaction --prefer-dist
          npm install

      - name: Run migrations
        env:
          APP_ENV: testing
        run: php artisan migrate --env=testing --force

      - name: Run tests
        env:
          APP_ENV: testing
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_migrations || 'false' }}
      SIERRA_AUTH_MAIL_MAILER: ${{ secrets.SIERRA_AUTH_MAIL_MAILER }}
      SIERRA_AUTH_MAIL_FROM_ADDRESS: ${{ secrets.SIERRA_AUTH_MAIL_FROM_ADDRESS }}
      SIERRA_AUTH_MAIL_FROM_NAME: ${{ secrets.SIERRA_AUTH_MAIL_FROM_NAME }}
      SIERRA_AUTH_MAIL_REPLY_TO_ADDRESS: ${{ secrets.SIERRA_AUTH_MAIL_REPLY_TO_ADDRESS }}
      SIERRA_AUTH_MAIL_REPLY_TO_NAME: ${{ secrets.SIERRA_AUTH_MAIL_REPLY_TO_NAME }}
      SIERRA_AUTH_SES_CONFIGURATION_SET: ${{ secrets.SIERRA_AUTH_SES_CONFIGURATION_SET }}
      SIERRA_AUTH_AWS_ACCESS_KEY_ID: ${{ secrets.SIERRA_AUTH_AWS_ACCESS_KEY_ID }}
      SIERRA_AUTH_AWS_SECRET_ACCESS_KEY: ${{ secrets.SIERRA_AUTH_AWS_SECRET_ACCESS_KEY }}
      SIERRA_AUTH_AWS_DEFAULT_REGION: ${{ secrets.SIERRA_AUTH_AWS_DEFAULT_REGION }}
      SIERRA_AUTH_PASSWORD_RESET_FRONTEND_URL: https://sierra.acadsoft.com.br

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger deploy on droplet
        run: |
          set -euo pipefail

          deploy_args=""

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            deploy_args="--migrate"
          fi

          required_env=(
            SIERRA_AUTH_MAIL_MAILER
            SIERRA_AUTH_MAIL_FROM_ADDRESS
            SIERRA_AUTH_MAIL_FROM_NAME
            SIERRA_AUTH_MAIL_REPLY_TO_ADDRESS
            SIERRA_AUTH_MAIL_REPLY_TO_NAME
            SIERRA_AUTH_SES_CONFIGURATION_SET
            SIERRA_AUTH_AWS_ACCESS_KEY_ID
            SIERRA_AUTH_AWS_SECRET_ACCESS_KEY
            SIERRA_AUTH_AWS_DEFAULT_REGION
            SIERRA_AUTH_PASSWORD_RESET_FRONTEND_URL
          )

          for name in "${required_env[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required for the production deploy."
              exit 1
            fi
          done

          b64() {
            printf '%s' "$1" | base64 -w 0
          }

          remote_exports=""
          for name in "${required_env[@]}"; do
            remote_exports="${remote_exports} ${name}_B64='$(b64 "${!name}")'"
          done
          remote_exports="${remote_exports} DEPLOY_ARGS_B64='$(b64 "${deploy_args}")'"

          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "${remote_exports} bash -s" <<'REMOTE'
            set -euo pipefail

            APP_DIR=/home/docker/acadsoft/sierra-auth
            HOST_ENV_FILE="${APP_DIR}/html/.env"
            CONTAINER_NAME=sierra_auth_app

            decode() {
              printf '%s' "$1" | base64 -d
            }

            update_env_file() {
              file="$1"
              key="$2"
              value="$(decode "$3")"
              tmp="$(mktemp)"

              mkdir -p "$(dirname "$file")"
              touch "$file"
              grep -v -E "^${key}=" "$file" > "$tmp" || true
              {
                cat "$tmp"
                printf '%s=%s\n' "$key" "$value"
              } > "$file"
              rm -f "$tmp"
            }

            apply_mail_env() {
              file="$1"

              update_env_file "$file" MAIL_MAILER "$SIERRA_AUTH_MAIL_MAILER_B64"
              update_env_file "$file" MAIL_FROM_ADDRESS "$SIERRA_AUTH_MAIL_FROM_ADDRESS_B64"
              update_env_file "$file" MAIL_FROM_NAME "$SIERRA_AUTH_MAIL_FROM_NAME_B64"
              update_env_file "$file" MAIL_REPLY_TO_ADDRESS "$SIERRA_AUTH_MAIL_REPLY_TO_ADDRESS_B64"
              update_env_file "$file" MAIL_REPLY_TO_NAME "$SIERRA_AUTH_MAIL_REPLY_TO_NAME_B64"
              update_env_file "$file" SES_CONFIGURATION_SET "$SIERRA_AUTH_SES_CONFIGURATION_SET_B64"
              update_env_file "$file" AWS_ACCESS_KEY_ID "$SIERRA_AUTH_AWS_ACCESS_KEY_ID_B64"
              update_env_file "$file" AWS_SECRET_ACCESS_KEY "$SIERRA_AUTH_AWS_SECRET_ACCESS_KEY_B64"
              update_env_file "$file" AWS_DEFAULT_REGION "$SIERRA_AUTH_AWS_DEFAULT_REGION_B64"
              update_env_file "$file" PASSWORD_RESET_FRONTEND_URL "$SIERRA_AUTH_PASSWORD_RESET_FRONTEND_URL_B64"
            }

            install_dependencies() {
              if command -v composer >/dev/null 2>&1; then
                (cd "${APP_DIR}/html" && composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader)
              else
                docker run --rm -v "${APP_DIR}/html:/app" -w /app composer:2 \
                  composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
              fi

              docker cp "${APP_DIR}/html/vendor" "${CONTAINER_NAME}:/var/www/html/vendor"
            }

            deploy_args="$(decode "$DEPLOY_ARGS_B64")"

            apply_mail_env "$HOST_ENV_FILE"

            cd "$APP_DIR"
            if [ -n "$deploy_args" ]; then
              ./deploy.sh "$deploy_args" </dev/null
            else
              ./deploy.sh </dev/null
            fi

            install_dependencies
            apply_mail_env "$HOST_ENV_FILE"
            docker cp "$HOST_ENV_FILE" "${CONTAINER_NAME}:/var/www/html/.env"
            docker restart "$CONTAINER_NAME"
            sleep 5

            docker exec "$CONTAINER_NAME" sh -lc '
              set -e

              mkdir -p \
                /var/www/html/storage/framework/cache/data \
                /var/www/html/storage/framework/sessions \
                /var/www/html/storage/framework/views \
                /var/www/html/storage/framework/testing \
                /var/www/html/storage/logs \
                /var/www/html/bootstrap/cache

              chown -R www-data:www-data \
                /var/www/html/storage \
                /var/www/html/bootstrap/cache

              chmod -R ug+rwX \
                /var/www/html/storage \
                /var/www/html/bootstrap/cache

              cd /var/www/html
              php -r "require \"vendor/autoload.php\"; exit(class_exists(\"Aws\\\\SesV2\\\\SesV2Client\") ? 0 : 1);"
              php artisan optimize:clear
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
            '
          REMOTE
