name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run production migrations during deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-autenticacao-api
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: autenticacao_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: bcmath, exif, gd, intl, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare environment
        run: |
          cp .env.testing.example .env.testing
          composer install --no-interaction --prefer-dist
          npm install

      - name: Run migrations
        env:
          APP_ENV: testing
        run: php artisan migrate --env=testing --force

      - name: Run tests
        env:
          APP_ENV: testing
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_migrations || 'false' }}

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add droplet to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger deploy on droplet
        run: |
          deploy_args=""

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            deploy_args="--migrate"
          fi

          remote_command="cd /home/docker/acadsoft/sierra-auth && ./deploy.sh ${deploy_args} && docker exec sierra_auth_app sh -lc 'mkdir -p /var/www/html/storage/framework/cache/data /var/www/html/storage/framework/sessions /var/www/html/storage/framework/views /var/www/html/storage/framework/testing /var/www/html/storage/logs /var/www/html/bootstrap/cache && chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && chmod -R ug+rwX /var/www/html/storage /var/www/html/bootstrap/cache'"

          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "${remote_command}"
